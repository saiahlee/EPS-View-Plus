name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install xcodegen xcbeautify
          brew install ghostscript

      - name: Build app via build-app.sh
        run: bash scripts/build-app.sh
        env:
          CI: 'true'

      - name: Source archive
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out
          git archive --format tar.gz --prefix "EPS-View-Plus-${VERSION}/" \
            -o "out/EPS-View-Plus-Source-${VERSION}.tar.gz" HEAD

      - name: Compute SHA256
        run: |
          cd out
          shasum -a 256 *.dmg *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/EPS-View-Plus-*.dmg
            out/EPS-View-Plus-Source-*.tar.gz
            out/SHA256SUMS.txt
          body: |
            ## EPS View+ ${{ github.ref_name }}

            **First-launch instructions** (one-time):

            Right-click "EPS View+.app" → Open → Open in the dialog.
            macOS remembers your choice for next time.

            Or, from Terminal:
            ```bash
            xattr -dr com.apple.quarantine "/Applications/EPS View+.app"
            ```

            **Quick Look note**: The bundled Quick Look extension is
            inactive in this release due to ad-hoc signing limitations.
            For Finder spacebar previews, pair with [Anybox EPS Preview](https://apps.apple.com/app/eps-preview/id1577022041).
            EPS View+ handles double-click viewing, zoom/pan, drag-and-drop,
            and PDF/PNG export.

            **Verification**: SHA256 checksums in `SHA256SUMS.txt`.

            **Source**: `EPS-View-Plus-Source-*.tar.gz` corresponds to this binary.
