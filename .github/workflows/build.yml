name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # macos-15 ships Xcode 16+ which is broadly compatible with the
    # XcodeGen-produced .xcodeproj. Older runners (macos-14) ship
    # Xcode 15 which can't read newer project formats.
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install xcodegen xcbeautify
          brew install ghostscript

      - name: Build app via build-app.sh
        run: bash scripts/build-app.sh
        env:
          # Skip the interactive prompt at the end — we don't need the
          # install instructions in CI logs.
          CI: 'true'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPS-View-Plus-${{ github.sha }}
          path: out/EPS-View-Plus-*.dmg
          retention-days: 30

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPS-View-Plus-app-${{ github.sha }}
          path: build/Build/Products/Release/EPS View+.app
          retention-days: 7
