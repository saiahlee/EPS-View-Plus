name: EPSViewer
options:
  bundleIdPrefix: io.github.saiahlee
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

# ──────────────────────────────────────────────────────────────────────────
# Settings shared by every target
# ──────────────────────────────────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    # Critical for ad-hoc signing without a Personal Team:
    # tell Xcode to use OUR entitlements file VERBATIM and not to
    # synthesize/strip keys based on team-membership lookups. Without
    # this, Xcode 26 silently empties the entitlements when it can't
    # match the App Group to a development team.
    PROVISIONING_PROFILE_SPECIFIER: ""
    # App Sandbox is OFF for the host app and extensions in ad-hoc-signed
    # builds. Without an Apple Developer Program team, macOS won't honor
    # the App Group entitlement, which leaves the host app stuck in a
    # broken sandbox where it cannot reach its own cache directory. We
    # ship without sandbox until/unless someone donates a Developer ID.
    ENABLE_APP_SANDBOX: NO
    # Note: we deliberately do NOT pass -warnings-as-errors here.
    # New Swift releases periodically introduce new warnings, and treating
    # those as errors would block users who build from source on a fresher
    # toolchain than ours. Warnings still surface in xcodebuild output.

# ──────────────────────────────────────────────────────────────────────────
# Targets
# ──────────────────────────────────────────────────────────────────────────
targets:

  # ------------------------------------------------------------------------
  # Host application
  # ------------------------------------------------------------------------
  EPSViewer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EPSViewer
      - path: Shared
    info:
      path: EPSViewer/Info.plist
    entitlements:
      path: EPSViewer/EPSViewer.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.saiahlee.EPSViewer
        PRODUCT_NAME: EPSViewer
        INFOPLIST_FILE: EPSViewer/Info.plist
        CODE_SIGN_ENTITLEMENTS: EPSViewer/EPSViewer.entitlements
        # AppIcon.icns is generated by scripts/build-app.sh from icon.png
        # and shipped as a top-level resource (not via Asset Catalog),
        # so the asset-catalog AppIcon name is left empty.
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ENABLE_APP_SANDBOX: NO
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: EPSPreview
      - target: EPSThumbnail
    preBuildScripts:
      - name: "Copy converter binary"
        script: |
          set -euo pipefail
          SRC_DIR="${SRCROOT}/ghostscript/universal"
          SRC="${SRC_DIR}/converter"
          DST_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Tools"
          if [ ! -f "$SRC" ]; then
            echo "warning: ${SRC} not found. Run 'cd ghostscript && bash build-universal.sh' before building Release."
            exit 0
          fi
          mkdir -p "$DST_DIR"
          cp -f "$SRC" "$DST_DIR/converter"
          chmod +x "$DST_DIR/converter"
          # If the converter has dylib dependencies (Homebrew bundle path),
          # copy them alongside so @rpath resolution finds them.
          if [ -d "${SRC_DIR}/lib" ]; then
            mkdir -p "$DST_DIR/lib"
            # cp -RL follows symlinks so we get real files in the bundle
            cp -RfL "${SRC_DIR}/lib/." "$DST_DIR/lib/"
          fi
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Tools/converter

  # ------------------------------------------------------------------------
  # Quick Look Preview Extension
  # ------------------------------------------------------------------------
  EPSPreview:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EPSPreview
      - path: Shared
    info:
      path: EPSPreview/Info.plist
    entitlements:
      path: EPSPreview/EPSPreview.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.saiahlee.EPSViewer.EPSPreview
        PRODUCT_NAME: EPSPreview
        INFOPLIST_FILE: EPSPreview/Info.plist
        CODE_SIGN_ENTITLEMENTS: EPSPreview/EPSPreview.entitlements
        # Sandbox OFF — see write_entitlements_extension comment in
        # scripts/build-app.sh for the rationale.
        ENABLE_APP_SANDBOX: NO
        WRAPPER_EXTENSION: appex
    preBuildScripts:
      - name: "Copy converter binary into extension"
        script: |
          set -euo pipefail
          SRC_DIR="${SRCROOT}/ghostscript/universal"
          SRC="${SRC_DIR}/converter"
          DST_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Tools"
          if [ ! -f "$SRC" ]; then
            echo "warning: ${SRC} not found. Run 'cd ghostscript && bash build-universal.sh' before building Release."
            exit 0
          fi
          mkdir -p "$DST_DIR"
          cp -f "$SRC" "$DST_DIR/converter"
          chmod +x "$DST_DIR/converter"
          # If the converter has dylib dependencies (Homebrew bundle path),
          # copy them alongside so @rpath resolution finds them.
          if [ -d "${SRC_DIR}/lib" ]; then
            mkdir -p "$DST_DIR/lib"
            # cp -RL follows symlinks so we get real files in the bundle
            cp -RfL "${SRC_DIR}/lib/." "$DST_DIR/lib/"
          fi
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Tools/converter

  # ------------------------------------------------------------------------
  # Thumbnail Extension
  # ------------------------------------------------------------------------
  EPSThumbnail:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EPSThumbnail
      - path: Shared
    info:
      path: EPSThumbnail/Info.plist
    entitlements:
      path: EPSThumbnail/EPSThumbnail.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.saiahlee.EPSViewer.EPSThumbnail
        PRODUCT_NAME: EPSThumbnail
        INFOPLIST_FILE: EPSThumbnail/Info.plist
        CODE_SIGN_ENTITLEMENTS: EPSThumbnail/EPSThumbnail.entitlements
        ENABLE_APP_SANDBOX: NO
        WRAPPER_EXTENSION: appex
    preBuildScripts:
      - name: "Copy converter binary into extension"
        script: |
          set -euo pipefail
          SRC_DIR="${SRCROOT}/ghostscript/universal"
          SRC="${SRC_DIR}/converter"
          DST_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Tools"
          if [ ! -f "$SRC" ]; then
            echo "warning: ${SRC} not found. Run 'cd ghostscript && bash build-universal.sh' before building Release."
            exit 0
          fi
          mkdir -p "$DST_DIR"
          cp -f "$SRC" "$DST_DIR/converter"
          chmod +x "$DST_DIR/converter"
          # If the converter has dylib dependencies (Homebrew bundle path),
          # copy them alongside so @rpath resolution finds them.
          if [ -d "${SRC_DIR}/lib" ]; then
            mkdir -p "$DST_DIR/lib"
            # cp -RL follows symlinks so we get real files in the bundle
            cp -RfL "${SRC_DIR}/lib/." "$DST_DIR/lib/"
          fi
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Tools/converter

# ──────────────────────────────────────────────────────────────────────────
# Schemes
# ──────────────────────────────────────────────────────────────────────────
schemes:
  EPSViewer:
    build:
      targets:
        EPSViewer: all
        EPSPreview: all
        EPSThumbnail: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
